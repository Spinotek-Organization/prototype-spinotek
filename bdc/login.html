<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bali DC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --lime: #d4ff33;
            --dark: #0a0a0a;
            --grid-color: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-md w-full space-y-12 text-center">
        <a href="index.html" class="inline-flex items-center space-x-2 mb-10 group">
            <div class="bg-lime-400 p-2 rounded-lg group-hover:rotate-12 transition">
                <i data-lucide="palm-tree" class="text-black w-6 h-6"></i>
            </div>
            <span class="text-3xl font-bold tracking-tighter">Bali <span class="text-[#d4ff33]">DC</span></span>
        </a>

        <div class="glass p-12 rounded-[48px] space-y-8 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#d4ff33]/10 blur-3xl"></div>
            
            <div class="space-y-2">
                <h1 class="text-4xl font-bold italic tracking-tighter">Welcome Back</h1>
                <p class="text-gray-500 text-sm font-bold uppercase tracking-widest">Sign in to access your perks</p>
            </div>

            <div class="space-y-4">
                <button onclick="window.location.href='dashboard-customer.html'" class="w-full py-5 bg-white text-black rounded-3xl flex items-center justify-center space-x-3 font-bold hover:bg-gray-100 transition shadow-xl">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6" alt="Google">
                    <span>Continue with Google</span>
                </button>
                <div class="flex items-center space-x-4 py-4 text-gray-700">
                    <div class="h-px bg-white/5 flex-1"></div>
                    <span class="text-[10px] uppercase font-bold tracking-widest">Testing Access</span>
                    <div class="h-px bg-white/5 flex-1"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <a href="dashboard-merchant.html" class="glass py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:border-[#d4ff33] transition">Merchant</a>
                    <a href="dashboard-admin.html" class="glass py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:border-[#d4ff33] transition">Admin</a>
                </div>
            </div>

            <p class="text-xs text-gray-600 leading-relaxed">
                By continuing, you agree to our <span class="text-white underline underline-offset-4 decoration-[#d4ff33]">Terms of Service</span> and <span class="text-white underline underline-offset-4 decoration-[#d4ff33]">Privacy Policy</span>.
            </p>
        </div>

        <a href="index.html" class="inline-flex items-center space-x-2 text-gray-500 hover:text-white transition uppercase text-[10px] font-bold tracking-[0.3em]">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
